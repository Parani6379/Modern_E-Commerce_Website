{% extends "layouts/base.html" %}
{% block title %}500 — Server Error | GirlHub{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
    <div class="text-center fade-up">
        <div class="relative inline-block mb-6">
            <span class="text-[10rem] font-black text-red-500 leading-none">500</span>
        </div>
        <h2 class="text-2xl font-bold mb-2">Something Went Wrong</h2>
        <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-md mx-auto">An unexpected error occurred. Please try again
            later.</p>
        <a href="{{ url_for('customer.home') }}"
            class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-primary-500 to-secondary-500 text-white font-semibold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
            <i class="fa-solid fa-house"></i> Go Home
        </a>
    </div>
</div>
{% endblock %}
