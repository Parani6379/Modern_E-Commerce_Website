{% extends "layouts/admin_base.html" %}
{% block title %}New Manual Order — Admin | The Girlhub{% endblock %}

{% block admin_content %}
<div class="fade-up max-w-3xl space-y-6">
    <div class="flex items-center gap-3">
        <a href="{{ url_for('admin.orders') }}" class="text-gray-400 hover:text-primary-500 transition"><i
                class="fa-solid fa-arrow-left text-lg"></i></a>
        <h1 class="text-3xl font-bold gradient-text">New Manual Order</h1>
    </div>

    <form method="POST" class="glass rounded-2xl p-6 space-y-5">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Customer Name *</label>
                <input type="text" name="customer_name" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition"
                    placeholder="Full name">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Email *</label>
                <input type="email" name="customer_email" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition"
                    placeholder="customer@email.com">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Phone *</label>
                <input type="tel" name="customer_phone" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition"
                    placeholder="+91 98765 43210">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Product</label>
                <select name="product_id"
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition">
                    <option value="">— No Product —</option>
                    {% for p in products %}
                    <option value="{{ p.id }}">{{ p.name }} (&#8377;{{ "%.2f"|format(p.price) }})</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Address</label>
            <textarea name="customer_address" rows="2"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition resize-y"
                placeholder="Delivery address"></textarea>
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">
                <i class="fa-brands fa-instagram text-pink-500 mr-1"></i>Instagram ID
                <span class="text-gray-400 font-normal text-xs">(optional)</span>
            </label>
            <div class="relative">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm font-semibold">@</span>
                <input type="text" name="instagram_id"
                    class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-pink-400 outline-none transition"
                    placeholder="customerhandle">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-semibold mb-1">Amount (&#8377;) *</label>
                <input type="number" name="amount" step="0.01" min="0" value="0" required
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold mb-1">Status</label>
                <input type="text" value="Enquiry" disabled
                    class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-100 dark:bg-gray-700 text-gray-500 cursor-not-allowed">
                <p class="text-xs text-gray-400 mt-1">All manual orders start as Enquiry</p>
            </div>
        </div>

        <div>
            <label class="block text-sm font-semibold mb-1">Notes / Preferences</label>
            <textarea name="preferences" rows="3"
                class="w-full px-4 py-2.5 rounded-xl border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-800 focus:ring-2 focus:ring-primary-400 outline-none transition resize-y"
                placeholder="Any special instructions..."></textarea>
        </div>

        <div class="flex gap-3 pt-2">
            <button type="submit"
                class="px-6 py-3 rounded-xl bg-gradient-to-r from-primary-500 to-secondary-500 text-white font-semibold shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all">
                <i class="fa-solid fa-plus mr-2"></i>Create Order
            </button>
            <a href="{{ url_for('admin.orders') }}"
                class="px-6 py-3 rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 font-medium transition">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
